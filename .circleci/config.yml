version: 2.1

jobs:
  build:
    docker:
      - image: zaksabeast/devkit3ds-rust

    steps:
      - checkout
      - run:
          name: install & make
          command: |
            rustup default nightly &&
            make debug CARGO_FLAGS="-Z sparse-registry"

workflows:
  debug_build-workflow:
    jobs:
      - build
