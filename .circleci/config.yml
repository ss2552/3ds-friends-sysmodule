version: 2.1

jobs:
  build:
    docker:
      - image: rust:latest

    steps:
      - checkout
      - run:
          name: install & make
          command: |
            rustup default nightly &&
            cargo install --locked cargo-3ds &&
            rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu &&
            make debug

workflows:
  debug_build-workflow:
    jobs:
      - build
